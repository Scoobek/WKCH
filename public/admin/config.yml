local_backend: true

backend:
    name: github
    repo: scoobek/WKCH
    branch: main
    base_url: https://bold-bird-7e4f.wojciech-skubisz.workers.dev

media_folder: "public/images/uploads"
public_folder: "/images/uploads"
locale: "pl"

collections:
    - name: "posts"
      label: "Blog Posts"
      label_singular: "Blog Post"
      folder: "src/content/posts"
      create: true
      slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
      fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Publish Date", name: "pubDate", widget: "datetime" }
          - {
                label: "Description",
                name: "description",
                widget: "string",
                required: false,
            }
          - {
                label: "Cover Image",
                name: "heroImage",
                widget: "image",
                required: false,
            }
          - { label: "Body", name: "body", widget: "markdown" }
