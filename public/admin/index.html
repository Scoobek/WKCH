<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Content Manager</title>
    </head>
    <body>
        <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

        <script>
            // Gallery preview template — shows gallery images in a 2-column grid
            // in the admin preview pane when editing a post
            function PostPreview(props) {
                var data = props.entry.get("data").toJS();
                var gallery = data.gallery;

                return h(
                    "article",
                    {
                        style: {
                            fontFamily: "sans-serif",
                            padding: "20px",
                            maxWidth: "800px",
                        },
                    },
                    h("h1", {}, data.title || ""),
                    data.description &&
                        h("p", { style: { color: "#666" } }, data.description),
                    data.heroImage &&
                        h("img", {
                            src: data.heroImage,
                            style: {
                                maxWidth: "100%",
                                height: "auto",
                                borderRadius: "6px",
                            },
                        }),
                    props.widgetFor("body"),
                    gallery &&
                        gallery.length > 0 &&
                        h(
                            "div",
                            {
                                style: {
                                    display: "grid",
                                    gridTemplateColumns: "repeat(2, 1fr)",
                                    gap: "8px",
                                    marginTop: "16px",
                                },
                            },
                            gallery.map(function (item, i) {
                                return h("img", {
                                    key: i,
                                    src: item.image,
                                    alt: item.alt || "",
                                    style: {
                                        width: "100%",
                                        height: "200px",
                                        objectFit: "cover",
                                        borderRadius: "4px",
                                    },
                                });
                            })
                        )
                );
            }

            CMS.registerPreviewTemplate("posts", PostPreview);
            CMS.registerPreviewTemplate("posts-en", PostPreview);
        </script>
    </body>
</html>
